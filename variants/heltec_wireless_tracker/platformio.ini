[env:heltec-wireless-tracker]
extends = esp32s3_base
build_type = debug
board = heltec_wireless_tracker
board_build.partitions = default_8MB.csv
upload_protocol = esptool
build_unflags = 
  -flto

build_flags = 
  ${esp32s3_base.build_flags} -I variants/heltec_wireless_tracker
  -fno-lto
  ; Test presets for narrowing HermesX UI-related crashes:
  ; 1. Coarse preset: disable HermesX modules + pages + overlays + custom alerts
  ; -D HERMESX_TEST_NO_UI=1
  ; 2. Re-enable modules, keep Screen pages/overlays/custom alerts off:
  ; -D HERMESX_TEST_DISABLE_HERMES_PAGES=1
  ; -D HERMESX_TEST_DISABLE_HERMES_OVERLAYS=1
  ; -D HERMESX_TEST_DISABLE_HERMES_ALERTS=1
  ; 3. Re-enable overlays/custom alerts, keep HermesX pages off:
  ; -D HERMESX_TEST_DISABLE_HERMES_PAGES=1
  ; 4. Full HermesX UI: all HERMESX_TEST_* flags commented out
  -D HELTEC_TRACKER_V1_1
  -D GPS_POWER_TOGGLE ; comment this line to disable triple press function on the user button to turn off gps entirely.
  ;-D DEBUG_DISABLED ; uncomment this line to disable DEBUG output

lib_deps =
  ${esp32s3_base.lib_deps}
  lovyan03/LovyanGFX@^1.2.0
